<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding Reels</title>
    <meta
      name="description"
      content="Coding Reels is a quick landing page for the Code Snippets study app."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6efe4;
        --panel: rgba(255, 252, 246, 0.84);
        --border: rgba(48, 36, 22, 0.14);
        --text: #24180f;
        --muted: #6e5646;
        --accent: #b24a2a;
        --accent-strong: #8c2f16;
        --shadow: 0 30px 80px rgba(72, 43, 22, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, 'Times New Roman', serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 34%),
          radial-gradient(circle at bottom right, rgba(178, 74, 42, 0.18), transparent 22%),
          linear-gradient(135deg, #f9f1e7 0%, #f3e5cf 52%, #ead7bc 100%);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .hero {
        width: min(960px, 100%);
        padding: 56px 32px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .eyebrow {
        margin: 0 0 18px;
        font-family: 'Trebuchet MS', 'Gill Sans', sans-serif;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 10vw, 5.8rem);
        line-height: 0.92;
        letter-spacing: -0.06em;
      }

      p {
        width: min(36rem, 100%);
        margin: 22px 0 0;
        font-size: clamp(1.08rem, 2.3vw, 1.35rem);
        line-height: 1.65;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 16px;
        margin-top: 34px;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 56px;
        padding: 0 24px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: #fff8f0;
        font-family: 'Trebuchet MS', 'Gill Sans', sans-serif;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-decoration: none;
        box-shadow: 0 18px 36px rgba(140, 47, 22, 0.28);
      }

      .cta:hover,
      .cta:focus-visible {
        transform: translateY(-1px);
      }

      .path-note {
        font-family: 'Trebuchet MS', 'Gill Sans', sans-serif;
        font-size: 0.98rem;
        color: var(--muted);
      }

      code {
        padding: 0.2rem 0.45rem;
        border-radius: 999px;
        background: rgba(36, 24, 15, 0.08);
        color: var(--text);
      }

      @media (max-width: 720px) {
        main {
          padding: 20px;
        }

        .hero {
          padding: 36px 24px;
          border-radius: 22px;
        }

        .actions {
          align-items: stretch;
        }

        .cta {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">Study App</p>
        <h1 id="page-title">Coding Reels</h1>
        <p>
          Explore the interview-prep reels app and jump straight into the existing experience hosted
          at <code>/code-snippets/</code>.
        </p>
        <div class="actions">
          <a class="cta" href="/code-snippets/">Open Coding Reels</a>
          <span class="path-note">GitHub Pages root landing page for the study app</span>
        </div>
      </section>
    </main>
  </body>
</html>
